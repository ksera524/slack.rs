# GitHub Actions workflow for slack.rs
# Auto-generated by add-runner.sh (公式ARC対応版) - latest運用

name: Build and Push to Harbor - slack.rs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        echo "=== Build image on GitHub-hosted runner ==="
        docker build -t slack.rs:ci .

    - name: Export Docker image tar
      run: |
        docker save slack.rs:ci | gzip > /tmp/slack.rs-image.tar.gz

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: slack.rs-image
        path: /tmp/slack.rs-image.tar.gz
        retention-days: 1

  push-image:
    if: github.event_name == 'push'
    needs: build-image
    runs-on: slack-rs-runners

    steps:
    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: slack.rs-image
        path: /tmp

    - name: Load Docker image
      run: |
        echo "=== Load image on self-hosted runner ==="
        gunzip -c /tmp/slack.rs-image.tar.gz | docker load

    - name: Setup kubectl and Harbor credentials
      run: |
        echo "=== Setup kubectl and Harbor credentials ==="

        echo "Installing kubectl..."
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

        echo "Configuring kubectl..."
        export KUBECONFIG=/tmp/kubeconfig
        kubectl config set-cluster default             --server=https://kubernetes.default.svc             --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt             --kubeconfig=$KUBECONFIG
        kubectl config set-credentials default             --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)             --kubeconfig=$KUBECONFIG
        kubectl config set-context default             --cluster=default --user=default             --kubeconfig=$KUBECONFIG
        kubectl config use-context default --kubeconfig=$KUBECONFIG

        echo "Getting Harbor credentials..."
        kubectl get secret harbor-auth -n arc-systems -o jsonpath='{.data.HARBOR_USERNAME}' | base64 -d > /tmp/harbor_username
        kubectl get secret harbor-auth -n arc-systems -o jsonpath='{.data.HARBOR_PASSWORD}' | base64 -d > /tmp/harbor_password
        kubectl get secret harbor-auth -n arc-systems -o jsonpath='{.data.HARBOR_PROJECT}' | base64 -d > /tmp/harbor_project
        kubectl get secret ca-key-pair -n cert-manager -o jsonpath='{.data.ca\.crt}' | base64 -d > /tmp/harbor_ca.crt

        chmod 600 /tmp/harbor_*
        echo "✅ Harbor credentials retrieved successfully"

    - name: Tag and push latest image
      run: |
        echo "=== Tag and push latest image on self-hosted runner ==="

        HARBOR_USERNAME=$(cat /tmp/harbor_username)
        HARBOR_PASSWORD=$(cat /tmp/harbor_password)
        HARBOR_URL="harbor.internal.qroksera.com"
        HARBOR_PROJECT=$(cat /tmp/harbor_project)

        echo "Installing internal CA..."
        sudo cp /tmp/harbor_ca.crt /usr/local/share/ca-certificates/harbor-internal-ca.crt
        sudo update-ca-certificates

        echo "Configuring Docker CA..."
        sudo mkdir -p /etc/docker/certs.d/harbor.internal.qroksera.com
        sudo cp /tmp/harbor_ca.crt /etc/docker/certs.d/harbor.internal.qroksera.com/ca.crt

        docker tag slack.rs:ci $HARBOR_URL/$HARBOR_PROJECT/slack.rs:latest

        echo "192.168.122.100 harbor.internal.qroksera.com" | sudo tee -a /etc/hosts

        echo "Logging in to Harbor..."
        docker login $HARBOR_URL -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD"

        echo "Pushing to Harbor..."
        docker push $HARBOR_URL/$HARBOR_PROJECT/slack.rs:latest

        echo "✅ Image pushed successfully to Harbor"
        echo "📦 Pushed tag: latest"

    - name: Restart sandbox workload
      run: |
        echo "=== Restart sandbox workload ==="
        if kubectl get deployment slack-rs -n sandbox >/dev/null 2>&1; then
          kubectl rollout restart deployment/slack-rs -n sandbox
          kubectl rollout status deployment/slack-rs -n sandbox --timeout=180s
          echo "✅ Restarted deployment/slack-rs"
        else
          echo "ℹ️ deployment/slack-rs は存在しないため再起動をスキップします"
        fi

    - name: Cleanup
      if: always()
      run: |
        echo "=== Cleanup ==="
        rm -f /tmp/harbor_* /tmp/kubeconfig /tmp/slack.rs-image.tar.gz
        echo "✅ Cleanup completed"
